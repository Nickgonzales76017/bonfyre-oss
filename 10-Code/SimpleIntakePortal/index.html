<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Audio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: #faf9f7;
      color: #171217;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }
    .shell { width: min(520px, 100%); }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p.sub { color: #888; margin-bottom: 32px; }

    .drop-zone {
      border: 2px dashed #ccc;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #0f766e;
      background: #f0fdf9;
    }
    .drop-zone p { color: #666; margin-top: 8px; }

    .form-section { margin-top: 24px; }
    label { display: block; font-weight: 600; margin-bottom: 4px; margin-top: 16px; }
    input, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
    }
    textarea { resize: vertical; min-height: 80px; }

    .file-badge {
      background: #f3f3f3;
      padding: 10px 14px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .file-badge .name { font-weight: 600; }
    .file-badge .size { color: #888; margin-left: 8px; }
    .file-badge button {
      background: none;
      border: none;
      color: #d55d3f;
      cursor: pointer;
      font-size: 1.1rem;
    }

    .submit-btn {
      display: block;
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      background: #0f766e;
      color: white;
      border: none;
      border-radius: 24px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .submit-btn:hover { background: #0d6b63; }

    .success {
      text-align: center;
      padding: 48px 24px;
      background: #f0fdf9;
      border-radius: 12px;
      margin-top: 24px;
    }
    .success h2 { color: #0f766e; }
    .success p { color: #666; margin-top: 8px; }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="shell">
    <h1>Submit your audio</h1>
    <p class="sub">We'll transcribe it and send you the results.</p>

    <div id="drop-zone" class="drop-zone" tabindex="0">
      <strong>Drop your file here</strong>
      <p>or click to browse</p>
      <input type="file" id="audio-file" accept="audio/*" hidden>
    </div>

    <div id="form-section" class="form-section hidden">
      <div class="file-badge">
        <div><span class="name" id="file-name"></span><span class="size" id="file-size"></span></div>
        <button id="clear-file" title="Remove">&times;</button>
      </div>

      <form id="intake-form">
        <label for="your-name">Your name</label>
        <input type="text" id="your-name" required placeholder="Jane Smith">

        <label for="job-title">What is this recording?</label>
        <input type="text" id="job-title" required placeholder="Weekly team standup, client call, etc.">

        <label for="notes">Anything we should know?</label>
        <textarea id="notes" placeholder="Optional context — who's speaking, what to focus on, etc."></textarea>

        <button type="submit" class="submit-btn">Submit</button>
      </form>
    </div>

    <div id="success" class="success hidden">
      <h2>Submitted!</h2>
      <p>We'll have your transcript ready soon.</p>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById("drop-zone");
    const audioInput = document.getElementById("audio-file");
    const formSection = document.getElementById("form-section");
    const form = document.getElementById("intake-form");
    const successEl = document.getElementById("success");
    let pendingFile = null;

    function fmtBytes(b) {
      const u = ["B","KB","MB","GB"]; let s = b, i = 0;
      while (s >= 1024 && i < u.length - 1) { s /= 1024; i++; }
      return (s >= 10 || i === 0 ? Math.round(s) : s.toFixed(1)) + " " + u[i];
    }

    function acceptFile(file) {
      if (!file) return;
      if (file.size > 100 * 1024 * 1024) { alert("File too large (max 100 MB)."); return; }
      pendingFile = file;
      document.getElementById("file-name").textContent = file.name;
      document.getElementById("file-size").textContent = fmtBytes(file.size);
      dropZone.classList.add("hidden");
      formSection.classList.remove("hidden");
    }

    dropZone.addEventListener("click", () => audioInput.click());
    audioInput.addEventListener("change", () => acceptFile(audioInput.files[0]));
    dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("drag-over"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
    dropZone.addEventListener("drop", (e) => { e.preventDefault(); dropZone.classList.remove("drag-over"); acceptFile(e.dataTransfer.files[0]); });

    document.getElementById("clear-file").addEventListener("click", () => {
      pendingFile = null;
      audioInput.value = "";
      form.reset();
      formSection.classList.add("hidden");
      dropZone.classList.remove("hidden");
    });

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      if (!pendingFile) return;
      // In production: POST file + metadata to upload endpoint
      // For now: show success state
      formSection.classList.add("hidden");
      successEl.classList.remove("hidden");
    });
  </script>
</body>
</html>
