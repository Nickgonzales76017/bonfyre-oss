<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#FF6B35" />
  <meta name="description" content="Bonfyre - 50 static C binaries. Pure C11. A complete backend platform." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800,900&display=swap" rel="stylesheet">
  <title>Bonfyre - AI That Runs On Your Machine</title>
  <script>
    (function () {
      var path = window.location.pathname;
      var base = path.indexOf('/bonfyre-oss/') === 0 || path === '/bonfyre-oss'
        ? '/bonfyre-oss'
        : '';
      var nativeFetch = window.fetch ? window.fetch.bind(window) : null;

      window.__BONFYRE_SITE_BASE__ = base;

      if (nativeFetch) {
        window.fetch = function (input, init) {
          if (typeof input === 'string' && input.charAt(0) === '/') {
            return nativeFetch(base + input, init);
          }

          if (typeof Request !== 'undefined' && input instanceof Request && input.url.indexOf(window.location.origin + '/') === 0) {
            return nativeFetch(new Request(base + input.url.slice(window.location.origin.length), input), init);
          }

          return nativeFetch(input, init);
        };
      }
    })();
  </script>
  <script defer src="./static/js/bundle.js"></script>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>
</html>
